# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Enhanced VideoDB Director MCP with Individual Agents

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: VideoDB API key to authorize the MCP server and access all 20 individual agents
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'python',
      args: ['-m', 'videodb_director_mcp.main', '--api-key', config.apiKey]
    })
  exampleConfig:
    apiKey: sk-your-videodb-api-key-here
